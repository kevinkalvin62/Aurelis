name: Quality

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  application:
    name: Application quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run quality
      - run: npm run doctor
      - run: npm run export:web

  backend:
    name: Reproducible backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run backend:start
      - run: npm run backend:reset
      - run: npm run backend:verify-types
      - if: always()
        run: npm run backend:stop
